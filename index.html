<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesquisa</title>

<style>
body {
  font-family: Arial;
  background: #F5F0E8;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

.step { display: none; }
.step.active { display: block; }

button {
  padding: 10px 20px;
  background: #B85C2A;
  color: white;
  border: none;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div class="step active" id="step1">
  <h2>Pergunta 1</h2>
  <textarea id="q1" placeholder="Digite sua resposta"></textarea><br><br>
  <button onclick="next(1)">Próximo</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <h2>Pergunta 2</h2>
  <input id="q2a" placeholder="Opção A"><br>
  <input id="q2b" placeholder="Opção B"><br>
  <input id="q2c" placeholder="Opção C"><br>
  <input id="q2d" placeholder="Opção D"><br><br>
  <button onclick="prev(2)">Voltar</button>
  <button onclick="next(2)">Próximo</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <h2>Pergunta 3</h2>
  <select id="q3">
    <option value="">Selecione</option>
    <option>A</option>
    <option>B</option>
    <option>C</option>
  </select><br><br>

  <textarea id="q3text" placeholder="Explique"></textarea><br><br>

  <button onclick="prev(3)">Voltar</button>
  <button onclick="next(3)">Próximo</button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
  <h2>Pergunta 4</h2>

  <label><input type="checkbox" name="q4" value="A"> A</label><br>
  <label><input type="checkbox" name="q4" value="B"> B</label><br>
  <label><input type="checkbox" name="q4" value="C"> C</label><br><br>

  <textarea id="q4text" placeholder="Explique"></textarea><br><br>

  <button onclick="prev(4)">Voltar</button>
  <button id="submitBtn" onclick="submitForm()">Enviar</button>
</div>

<!-- SUCESSO -->
<div class="step" id="success">
  <h2>✅ Obrigado!</h2>
</div>

</div>

<script>

function next(step) {

  if(step === 1 && !document.getElementById("q1").value){
    alert("Responda a pergunta 1");
    return;
  }

  if(step === 3 && !document.getElementById("q3").value){
    alert("Selecione uma opção");
    return;
  }

  document.getElementById("step"+step).classList.remove("active");
  document.getElementById("step"+(step+1)).classList.add("active");
}

function prev(step){
  document.getElementById("step"+step).classList.remove("active");
  document.getElementById("step"+(step-1)).classList.add("active");
}

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Enviando...";

  const payload = {
    q1: document.getElementById("q1").value,
    q2a: document.getElementById("q2a").value,
    q2b: document.getElementById("q2b").value,
    q2c: document.getElementById("q2c").value,
    q2d: document.getElementById("q2d").value,
    q3: document.getElementById("q3").value,
    q3text: document.getElementById("q3text").value,
    q4: Array.from(document.querySelectorAll('input[name="q4"]:checked')).map(el => el.value).join(", "),
    q4text: document.getElementById("q4text").value
  };

  try {
  await fetch("https://script.google.com/macros/s/AKfycbxbhdY9weh6sDWGkbBkNgfAEzmQ8DJvmjnJM9j4Qsxr_zds9dn-Ac1Xpi1OhqjHpzfCBg/exec", {

      "Content-Type": "application/json"
    }
  });

  // ✅ FORÇA SUCESSO (porque no-cors não retorna resposta)

  document.getElementById("stepThanks").classList.add("active");
  document.getElementById("progressFill").style.width = "100%";

} catch (e) {
  btn.disabled = false;
  btn.textContent = "Enviar respostas ✓";
  alert("Erro de conexão. Verifique sua internet e tente novamente.");
}
}

</script>

</body>
</html>
